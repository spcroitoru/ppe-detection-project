# data.yaml - PPE Detection dataset configuration
# MANUALLY CORRECTED based on investigation:
#   - the original file from Kaggle had nc: 9 but 10 names listed (inconsistent)
#   - label analysis (labels/*.txt) showed 11 distinct class ids (0-10)
#   - class 10 was completely missing from the list - identified VISUALLY as
#     "hands without gloves" -> named NO_Gloves, following the existing convention
#     (NO_helmet, NO_Vest, NO_goggles)
#   - the original paths were from Google Colab (/content/dataset) - replaced
#     with local relative paths

path: ./data_raw   # dataset root, relative to where the script is run
train: train_split.txt   # 90% of the original (train+val), randomly re-split (see src/data_utils.py resplit_train_val)
val: val_split.txt       # 10% of the original (train+val)
test: test/images

nc: 11

names:
  0: Helmet
  1: Safety_Vest
  2: Safety_goggles
  3: Safety_shoes
  4: NO_helmet
  5: NO_Vest
  6: NO_goggles
  7: No_SafetyShoes
  8: Person
  9: Slippers
  10: NO_Gloves